services:
  postgres:
    image: postgres:16
    container_name: workqueue-postgres
    environment:
      POSTGRES_DB: WorkQueue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - workqueue_postgres_data:/var/lib/postgresql/data

volumes:
  workqueue_postgres_data: